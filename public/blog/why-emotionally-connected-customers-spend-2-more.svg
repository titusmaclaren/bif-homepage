<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Emotionally connected customers</title>
  <desc id="desc">A Black Iris Films editorial thumbnail showing the FEEL, SHOW, DELIVER framework.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1826"/>
      <stop offset="0.52" stop-color="#29334D"/>
      <stop offset="1" stop-color="#101623"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#61B383"/>
      <stop offset="1" stop-color="#3BDE7A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="48%">
      <stop offset="0" stop-color="#61B383" stop-opacity="0.34"/>
      <stop offset="0.58" stop-color="#61B383" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#61B383" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#05070b" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <g opacity="0.3">
    <circle cx="974" cy="118" r="210" fill="#5F4B8B"/>
    <circle cx="165" cy="558" r="190" fill="#61B383"/>
  </g>
  <g transform="translate(84 78)">
    <text x="0" y="0" fill="#61B383" font-family="Montserrat, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="7">VIDEO MARKETING</text>
    <text x="0" y="76" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="700">Why emotionally</text>
    <text x="0" y="148" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="700">connected customers</text>
    <text x="0" y="220" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="700">spend 2x more</text>
    <text x="0" y="282" fill="#D4E0EB" font-family="Montserrat, Arial, sans-serif" font-size="25" font-weight="400">Emotion first. Logic second.</text>
  </g>
  <g transform="translate(118 442)" filter="url(#shadow)">
    <rect x="0" y="0" width="232" height="116" rx="22" fill="#FAFAF8"/>
    <circle cx="58" cy="58" r="28" fill="#E8F5EE"/>
    <path d="M58 73c-24-14-32-28-25-40 6-10 19-10 25 2 6-12 19-12 25-2 7 12-1 26-25 40Z" fill="none" stroke="#61B383" stroke-width="6" stroke-linejoin="round"/>
    <text x="108" y="51" fill="#29334D" font-family="Montserrat, Arial, sans-serif" font-size="21" font-weight="700">FEEL</text>
    <text x="108" y="79" fill="#4B6B8B" font-family="Montserrat, Arial, sans-serif" font-size="16">Choose emotion</text>
  </g>
  <g transform="translate(414 442)" filter="url(#shadow)">
    <rect x="0" y="0" width="232" height="116" rx="22" fill="#FAFAF8"/>
    <circle cx="58" cy="58" r="28" fill="#F6EBC6"/>
    <path d="M42 46h32v24H42zM50 46v-7h16v7M42 70l11-11 8 8 13-16" fill="none" stroke="#E8B82F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="108" y="51" fill="#29334D" font-family="Montserrat, Arial, sans-serif" font-size="21" font-weight="700">SHOW</text>
    <text x="108" y="79" fill="#4B6B8B" font-family="Montserrat, Arial, sans-serif" font-size="16">Signal clearly</text>
  </g>
  <g transform="translate(710 442)" filter="url(#shadow)">
    <rect x="0" y="0" width="272" height="116" rx="22" fill="#FAFAF8"/>
    <circle cx="58" cy="58" r="28" fill="#E7E4F0"/>
    <path d="M42 72V44l35 14-35 14Z" fill="#5F4B8B"/>
    <text x="108" y="51" fill="#29334D" font-family="Montserrat, Arial, sans-serif" font-size="21" font-weight="700">DELIVER</text>
    <text x="108" y="79" fill="#4B6B8B" font-family="Montserrat, Arial, sans-serif" font-size="16">Pay it off</text>
  </g>
  <path d="M350 500h64M646 500h64" stroke="#61B383" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <g transform="translate(998 96)">
    <path d="M24 4 126 42 24 80 4 42 24 4Z" fill="#5F4B8B"/>
    <path d="M24 4 126 42 70 63 4 42 24 4Z" fill="#303C59"/>
    <path d="M4 42 70 63 24 80Z" fill="#151A26"/>
  </g>
